name: Postman API Tests (Automated)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Newman e Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra


      
      - name: Executar testes via Postman API
        run: |
          newman run "https://api.postman.com/collections/23724069-f07f997c-6c01-4c38-bbb0-09aabaac5954" \
          --header "X-Api-Key: ${{ secrets.POSTMAN_API_KEY }}" \
          --delay-request 500 \
          -r cli,htmlextra \
          --reporter-htmlextra-export report.html
          
      - name: Upload do relatório
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: report.html
